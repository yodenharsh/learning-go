edition = "2024";

package main;

import "order.proto";
import "user.proto";

option go_package = "/gen;mainpb";

service GreeterService {
  rpc SayHello(GreeterServiceSayHelloRequest) returns (GreeterServiceSayHelloResponse);
  rpc Orders(User) returns (OrdersResponse);
}

message GreeterServiceSayHelloRequest {
  string name = 1;
  uint32 age = 2;
}

message GreeterServiceSayHelloResponse {
  string conf_message = 1;
  repeated string data = 2;
}

message UserProfile {
  string username = 1;
  string email = 2;
}
