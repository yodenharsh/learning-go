edition = "2024";

import "greeter.proto";

package mainpb;

option go_package = "/gen;mainpb";

service CalculateService {
  rpc Add(AddRequest) returns (AddResponse);
}

service GreeterService {
    rpc Greet (HelloRequest) returns (HelloResponse);
}

message AddRequest {
  int32 a = 1;
  int32 b = 2;
}

message AddResponse {
  int32 sum = 1;
}
